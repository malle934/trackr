<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Trackr — Job Application Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app" id="app">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 22 22" fill="none" aria-hidden="true">
        <rect x="1" y="1" width="9" height="9" rx="2.5" fill="#6c63ff" opacity="0.9"/>
        <rect x="12" y="1" width="9" height="9" rx="2.5" fill="#6c63ff" opacity="0.4"/>
        <rect x="1" y="12" width="9" height="9" rx="2.5" fill="#6c63ff" opacity="0.4"/>
        <rect x="12" y="12" width="9" height="9" rx="2.5" fill="#6c63ff" opacity="0.7"/>
      </svg>
      Track<span>r</span>
    </div>

    <!-- Desktop actions -->
    <div class="header-actions desktop-only">
      <button class="btn btn-sm" id="btn-paste">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        Smart paste
      </button>
      <button class="btn btn-green btn-sm" id="btn-gmail">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Sync Gmail
      </button>
      <button class="btn btn-primary btn-sm" id="btn-add">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add
      </button>
    </div>

    <!-- Mobile menu button -->
    <button class="mobile-menu-btn mobile-only" id="btn-mobile-menu" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </header>

  <!-- MOBILE MENU DROPDOWN -->
  <div class="mobile-menu" id="mobile-menu" hidden>
    <button class="mobile-menu-item" id="btn-paste-m">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
      Smart paste
    </button>
    <button class="mobile-menu-item green" id="btn-gmail-m">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      Sync Gmail
    </button>
    <button class="mobile-menu-item primary" id="btn-add-m">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add application
    </button>
  </div>

  <!-- MAIN -->
  <main class="main">

    <!-- STATS -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card skeleton"></div>
      <div class="stat-card skeleton"></div>
      <div class="stat-card skeleton"></div>
      <div class="stat-card skeleton"></div>
      <div class="stat-card skeleton"></div>
    </div>

    <!-- TABS -->
    <div class="tabs" role="tablist">
      <button class="tab active" id="tab-pipeline" role="tab" aria-selected="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="5" height="15" rx="1"/></svg>
        Pipeline
      </button>
      <button class="tab" id="tab-analytics" role="tab" aria-selected="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Analytics
      </button>
    </div>

    <!-- PIPELINE TAB -->
    <div id="panel-pipeline" role="tabpanel">

      <!-- TOOLBAR -->
      <div class="toolbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" id="search-input" placeholder="Search company or role…" type="search">
        </div>
        <select class="select-input" id="sort-select">
          <option value="date">Newest first</option>
          <option value="company">Company A–Z</option>
          <option value="priority">By priority</option>
          <option value="stage">By stage</option>
        </select>
        <div id="filter-tag-wrap"></div>
        <div class="ml-auto view-toggle">
          <button class="view-btn active" id="btn-kanban" title="Kanban">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="5" height="15" rx="1"/></svg>
          </button>
          <button class="view-btn" id="btn-list" title="List">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
      </div>

      <!-- KANBAN -->
      <div class="board-wrap" id="kanban-view">
        <div class="board" id="board"></div>
      </div>

      <!-- LIST VIEW -->
      <div class="list-view" id="list-view" hidden>
        <div class="list-table-wrap">
          <table class="list-table">
            <thead>
              <tr>
                <th>Company</th>
                <th>Role</th>
                <th>Stage</th>
                <th>Priority</th>
                <th>Applied</th>
                <th>Salary</th>
                <th>Location</th>
              </tr>
            </thead>
            <tbody id="list-body"></tbody>
          </table>
        </div>
      </div>

    </div><!-- /panel-pipeline -->

    <!-- ANALYTICS TAB -->
    <div id="panel-analytics" hidden role="tabpanel">

      <!-- Analytics controls -->
      <div class="analytics-controls">
        <div class="analytics-range">
          <span class="ctrl-label">Range</span>
          <div class="range-btns">
            <button class="range-btn" data-days="30">30d</button>
            <button class="range-btn active" data-days="90">90d</button>
            <button class="range-btn" data-days="180">180d</button>
            <button class="range-btn" data-days="365">1yr</button>
          </div>
          <span class="ctrl-label" style="margin-left:12px">Custom</span>
          <input type="date" class="date-input" id="analytics-from">
          <span style="color:var(--text3);font-size:13px">→</span>
          <input type="date" class="date-input" id="analytics-to">
        </div>
        <div class="analytics-group">
          <span class="ctrl-label">Group by</span>
          <div class="range-btns">
            <button class="group-btn" data-group="daily">Daily</button>
            <button class="group-btn active" data-group="weekly">Weekly</button>
            <button class="group-btn" data-group="monthly">Monthly</button>
          </div>
        </div>
      </div>

      <!-- Summary stat cards -->
      <div class="analytics-summary" id="analytics-summary"></div>

      <!-- Timeline chart -->
      <div class="analytics-section">
        <div class="section-title">Application timeline</div>
        <div class="chart-wrap">
          <canvas id="timeline-chart"></canvas>
        </div>
      </div>

      <!-- Calendar + Day detail -->
      <div class="analytics-bottom">
        <div class="analytics-section calendar-section">
          <div class="section-title" id="cal-month-label">May 2026</div>
          <div class="cal-nav">
            <button class="cal-nav-btn" id="cal-prev">‹</button>
            <button class="cal-nav-btn" id="cal-next">›</button>
          </div>
          <div class="calendar" id="calendar"></div>
        </div>
        <div class="analytics-section day-detail-section">
          <div class="section-title" id="day-detail-title">Click a day to see applications</div>
          <div id="day-detail-list"></div>
        </div>
      </div>

    </div><!-- /panel-analytics -->

  </main>

  <!-- MOBILE BOTTOM NAV -->
  <nav class="bottom-nav mobile-only">
    <button class="bottom-nav-btn active" id="bnav-pipeline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="5" height="15" rx="1"/></svg>
      <span>Pipeline</span>
    </button>
    <button class="bottom-nav-btn" id="bnav-analytics">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Analytics</span>
    </button>
    <button class="bottom-nav-btn" id="bnav-add">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>Add</span>
    </button>
    <button class="bottom-nav-btn" id="bnav-gmail">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <span>Gmail</span>
    </button>
  </nav>

</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" hidden>
  <div class="modal" id="modal-box" tabindex="-1"></div>
</div>

<!-- TOAST -->
<div id="toast" class="toast" hidden></div>

<script>
  window.BACKEND_URL = 'https://web-production-6e08d.up.railway.app';
  if (!window.BACKEND_URL || window.BACKEND_URL.includes('railway') === false) {
    window.BACKEND_URL = 'http://localhost:8000';
  }
</script>
<script src="js/api.js"></script>
<script src="js/board.js"></script>
<script src="js/modals.js"></script>
<script src="js/analytics.js"></script>
<script src="js/app.js"></script>
</body>
</html>
